<style>
:root{--primary:#2e7d32;--secondary:#4caf50;--bg:#f4f6f8;--tmap:#ff5000;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;margin:0;background:var(--bg);color:#333;}
header{background:var(--primary);color:white;padding:18px 15px;text-align:center;}
header h1{margin:0;font-size:1.4em;}
header p{margin:6px 0 0;font-size:0.9em;opacity:0.9;}
.container{max-width:800px;margin:auto;padding:15px;}
.search-area{display:flex;margin-bottom:20px;position:sticky;top:10px;z-index:10;box-shadow:0 4px 6px rgba(0,0,0,0.1);border-radius:8px;}
#searchInput{flex:1;padding:15px;border:2px solid var(--primary);border-radius:8px 0 0 8px;font-size:1.1em;border-right:none;outline:none;}
.search-btn{background:var(--primary);color:white;border:2px solid var(--primary);border-radius:0 8px 8px 0;padding:0 20px;font-size:1.5em;cursor:pointer;}
.card{background:white;border-radius:10px;padding:20px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.08);border:1px solid #e0e0e0;}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.name{font-size:1.3em;font-weight:bold;color:var(--primary);}
.holes{background:var(--secondary);color:white;padding:3px 10px;border-radius:15px;font-size:0.9em;}
.info{font-size:0.95em;line-height:1.8;color:#444;margin-bottom:4px;}
.manager-tag{color:#c62828;font-weight:bold;background:#ffebee;padding:2px 6px;border-radius:4px;}
.btn-group{display:flex;gap:8px;margin-top:10px;}
.btn{flex:1;padding:12px;text-align:center;border-radius:6px;text-decoration:none;font-weight:bold;font-size:0.95em;cursor:pointer;border:none;display:block;}
.btn-online{background:var(--primary);color:white;}
.btn-copy{background:#757575;color:white;max-width:85px;}
.btn-phone{background:white;color:var(--primary);border:1px solid var(--primary);}
.btn-tmap{background:var(--tmap);color:white;}
.btn-disabled{background:#e0e0e0;color:#757575;cursor:default;}
.no-result{text-align:center;padding:40px 20px;color:#888;}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 22px;border-radius:20px;font-size:0.95em;font-weight:bold;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;}
</style>
</head>

function toast(msg){
    var t=document.getElementById('toast');
    t.innerText=msg; t.style.opacity='1';
    clearTimeout(t._t);
    t._t=setTimeout(function(){t.style.opacity='0';},2000);
}

function copyUrl(url){
    if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(url).then(function(){toast('주소가 복사되었습니다');}).catch(function(){fb(url);});
    } else {fb(url);}
}
function fb(url){
    var ta=document.createElement('textarea');ta.value=url;
    ta.style.cssText='position:fixed;opacity:0;';
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    toast('주소가 복사되었습니다');
}

function openTmap(name){
    var enc=encodeURIComponent(name);
    location.href='tmap://search?name='+enc;
    setTimeout(function(){
        if(document.hasFocus())window.open('https://m.map.kakao.com/link/search?q='+enc,'_blank');
    },2000);
}

function render(data){
    var el=document.getElementById('list');
    el.innerHTML='';
    if(!data.length){el.innerHTML='<div class="no-result">검색 결과가 없습니다.</div>';return;}
    var frag=document.createDocumentFragment();
    data.forEach(function(d){
        var c=document.createElement('div');c.className='card';
        var res=d.res_url
            ? '<div class="btn-group"><a href="'+d.res_url+'" target="_blank" class="btn btn-online">예약 시스템 접속</a>'
              +'<button class="btn btn-copy" onclick="copyUrl(\''+d.res_url+'\')">주소 복사</button></div>'
            : '<div class="btn-group"><button class="btn btn-disabled">온라인 예약 미지원 (전화 예약)</button></div>';
        c.innerHTML='<div class="card-top"><span class="name">'+d.name+'</span><span class="holes">'+d.holes+'홀</span></div>'
            +'<div class="info">📍 <b>주소:</b> '+d.addr+'<br>🏛️ <b>관리처:</b> <span class="manager-tag">'+d.manager+'</span></div>'
            +res
            +'<div class="btn-group"><button class="btn btn-tmap" onclick="openTmap(\''+d.name+'\')">티맵 길안내</button>'
            +'<a href="tel:'+d.phone+'" class="btn btn-phone">전화 연결</a></div>';
        frag.appendChild(c);
    });
    el.appendChild(frag);
}

function filterCourses(){
    var w=document.getElementById('searchInput').value.trim().toLowerCase();
    render(DB.filter(function(d){return d._s.includes(w);}));
}
document.getElementById('searchInput').addEventListener('keydown',function(e){if(e.key==='Enter')filterCourses();});
render(DB);
  </script>
 </body>
</html>
